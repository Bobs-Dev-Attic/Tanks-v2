<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0d1117" />
    <title>Tanks-v2 — WWII Isometric Squad Commander</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0d1117;
        font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
        overscroll-behavior: none;
      }
      #game-canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
        touch-action: none;
      }
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: radial-gradient(circle at 50% 35%, #1b2430, #0a0d12 75%);
        color: #cdd6c4;
        transition: opacity 0.6s ease;
        z-index: 10;
      }
      #boot h1 {
        font-size: clamp(2.2rem, 8vw, 4rem);
        letter-spacing: 0.14em;
        margin: 0;
        color: #d9dcc2;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      #boot .sub {
        font-size: clamp(0.8rem, 3vw, 1.1rem);
        color: #8b95a0;
      }
      #boot .ver {
        font-size: clamp(1rem, 3.5vw, 1.4rem);
        color: #7fd77f;
        font-weight: bold;
      }
      #boot .bar {
        margin-top: 14px;
        width: min(240px, 60vw);
        height: 5px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      #boot .bar > span {
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 3px;
        background: linear-gradient(90deg, #5a7d3a, #9bc06a);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(320%); }
      }
      #boot.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="game-canvas"></canvas>

    <div id="boot">
      <h1>TANKS-V2</h1>
      <div class="sub">WWII Isometric Squad Commander</div>
      <div class="ver" id="boot-version">v0.10.0</div>
      <div class="sub">Loading battlefield…</div>
      <div class="bar"><span></span></div>
    </div>

    <script type="module">
      // The ?v= query busts caches per release: the JS and wasm filenames are
      // stable across versions, so without this a browser holding an old
      // immutable copy would keep running the previous build.
      import init from "./tanks.js?v=0.10.0";

      const boot = document.getElementById("boot");

      // The engine dismisses this overlay from Rust once it's running (see
      // ui.rs). We do NOT rely on init()'s promise: on wasm, winit uses an
      // exception for control flow, so init() never resolves even though the
      // game runs fine. This safety net reveals the canvas if that ever fails.
      setTimeout(() => boot && boot.classList.add("hidden"), 25000);

      init({ module_or_path: "./tanks_bg.wasm?v=0.10.0" }).catch((err) => {
        // Expected on wasm (winit control-flow exception) — the game is still
        // running. Only surface a real, early failure.
        console.debug("init() threw (expected on wasm):", err);
      });
    </script>
  </body>
</html>
